name: python-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Environment sanity check
        run: python scripts/verify_environment.py
      - name: Compile python modules
        run: |
          python -m py_compile src/similarity/paper_similarity.py src/researcher/researcher_analysis.py
          python -m py_compile src/ml/features.py src/ml/train.py src/network/author_network.py src/clustering/research_clustering.py scripts/colab_setup.py
